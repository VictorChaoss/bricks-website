<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRICKS | Minifigures</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="noise-overlay"></div>

    <header>
        <div class="logo">
            <img src="assets/logo.jpg" alt="BRICKS Logo">
        </div>
        <div class="nav-links">
            <a href="index.html">DISCOVER</a>
            <a href="drops.html">DROPS</a>
            <a href="minifigures.html" class="active">MINIFIGURES</a>
            <a href="pfp.html">PFP MAKER</a>
            <a href="socials.html">SOCIALS</a>
            <a href="about.html">ABOUT</a>
        </div>
        <div class="cart-icon">CART (0)</div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>MINIFIGURES</h1>
                <p>LIMITED EDITION SATIRICAL FIGURES. COLLECT THEM ALL.</p>
                <div class="scroll-indicator">SCROLL TO EXPLORE</div>
            </div>
        </section>

        <!-- Category Filter Bar -->
        <div class="filter-bar" id="figFilterBar">
            <button class="filter-btn active" data-filter="all">ALL</button>
            <button class="filter-btn" data-filter="politics">POLITICS</button>
            <button class="filter-btn" data-filter="crime">CRIME</button>
            <button class="filter-btn" data-filter="sports">SPORTS</button>
            <button class="filter-btn" data-filter="entertainment">ENTERTAINMENT</button>
            <button class="filter-btn" data-filter="internet">INTERNET</button>
            <button class="filter-btn" data-filter="fiction">FICTION</button>
            <button class="filter-btn" data-filter="new">🔥 NEW</button>
        </div>

        <section class="gallery-container">
            <div id="minifigure-grid" class="gallery-grid">
                <!-- Items will be injected here by JS -->
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 BRICKS Satire Project. Not affiliated with The LEGO Group.</p>
            <p>For parody and entertainment purposes only.</p>
        </div>
    </footer>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox hidden">
        <div class="lightbox-content">
            <span class="close-lightbox">&times;</span>
            <img id="lightbox-img" src="" alt="Minifigure Detail">
            <div class="lightbox-details">
                <h2 id="lightbox-title">FIGURE TITLE</h2>
                <div class="lightbox-meta">
                    <span class="price">$9.99</span>
                    <span class="status">SOLD OUT</span>
                </div>
                <button class="buy-btn" disabled>SOLD OUT</button>
            </div>
        </div>
        <div class="lightbox-backdrop"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
